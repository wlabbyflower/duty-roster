<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>值班看板</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="wrap">
      <header class="topbar card">
        <div>
          <p class="tag">DUTY ROSTER</p>
          <h1>今日值班</h1>
          <p id="todayDate" class="muted">加载中...</p>
        </div>
        <button id="openSettingsBtn" class="icon-btn" aria-label="打开设置">⚙</button>
      </header>

      <section class="duty-grid">
        <article class="card duty-card">
          <p class="label">售前</p>
          <h2 id="preSales">--</h2>
        </article>
        <article class="card duty-card">
          <p class="label">售后</p>
          <h2 id="afterSales">--</h2>
        </article>
      </section>
    </main>

    <div id="settingsMask" class="mask"></div>
    <aside id="settingsPanel" class="settings">
      <header class="settings-head">
        <h3>值班设置</h3>
        <button id="closeSettingsBtn" class="icon-btn small" aria-label="关闭设置">✕</button>
      </header>

      <section class="block">
        <h4>1. Excel 导入 / 排班编辑</h4>
        <div class="row">
          <input id="excelFile" type="file" accept=".xlsx" />
          <button id="importExcelBtn" class="btn">导入</button>
        </div>
        <div class="row">
          <button id="addRowBtn" class="btn ghost">新增一行</button>
          <button id="saveScheduleBtn" class="btn">保存排班</button>
          <button id="exportExcelBtn" class="btn ghost">导出 Excel</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>售前</th>
                <th>售后</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="scheduleTableBody"></tbody>
          </table>
        </div>
        <h4 style="margin-top: 12px">按周模板（导入生成）</h4>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>周几</th>
                <th>售前</th>
                <th>售后</th>
              </tr>
            </thead>
            <tbody id="weeklyTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="block">
        <h4>2. 企业微信机器人通知</h4>
        <label>Webhook 地址</label>
        <input id="webhookInput" type="text" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=..." />

        <div class="row two">
          <div>
            <label>每天通知时间</label>
            <input id="notifyTimeInput" type="time" />
          </div>
          <div>
            <label>通知人数</label>
            <input id="notifyCountInput" type="number" min="0" value="0" />
          </div>
        </div>

        <label>@成员 UserID（逗号或换行分隔）</label>
        <textarea id="mentionIdsInput" rows="3" placeholder="zhangsan\nlisi"></textarea>

        <label>时区</label>
        <input id="timezoneInput" type="text" value="Asia/Shanghai" />

        <div class="row">
          <button id="saveSettingsBtn" class="btn">保存通知配置</button>
          <button id="testNotifyBtn" class="btn ghost">发送测试通知</button>
        </div>
      </section>
    </aside>

    <div id="toast" class="toast"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
